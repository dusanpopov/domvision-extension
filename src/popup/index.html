<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOMVision - Dev Tool</title>
  </head>
  <body class="w-64 bg-slate-950 p-4 text-slate-200 border border-slate-800">
    <div
      class="flex items-center justify-between border-b border-slate-800 pb-3 mb-4"
    >
      <div class="flex flex-col">
        <h1 class="text-brand-blue font-bold text-lg tracking-tight">
          DOMVision
        </h1>
        <span class="text-[10px] text-slate-500 uppercase tracking-widest"
          >v1.0.0</span
        >
      </div>
      <div class="relative flex h-3 w-3">
        <span
          class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"
        ></span>
        <span
          class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"
        ></span>
      </div>
    </div>

    <div class="space-y-3">
      <p class="text-xs text-slate-400 leading-relaxed">
        Spremi se za dubok uvid u strukturu sajta. Pređi mišem preko bilo kog
        elementa i klikni da izvučeš kod.
      </p>

      <div class="bg-slate-900/50 rounded-lg p-2.5 border border-slate-800/50">
        <h3 class="text-[9px] uppercase font-bold text-slate-500 mb-2">
          Prečice
        </h3>
        <div class="flex justify-between text-[11px] text-slate-300">
          <span>Zamrzni element</span>
          <span class="text-brand-blue font-mono">[Klik]</span>
        </div>
      </div>
    </div>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
